<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Logo Valor por Extenso - Download PNG 256x256</title>
<style>
  body { font-family: system-ui, sans-serif; background:#f4f6fa; margin:0; padding:40px; text-align:center; }
  h1 { color:#0f1d3a; margin-bottom:8px; }
  p  { color:#475569; margin-top:0; }
  .preview { display:inline-block; margin:24px; padding:24px; background:#fff; border-radius:16px; box-shadow:0 6px 24px rgba(15,29,58,.10); }
  .preview svg { display:block; }
  button { background:#0f1d3a; color:#fff; border:0; padding:14px 28px; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; margin:8px; }
  button:hover { background:#1e3a8a; }
  .row { display:flex; justify-content:center; flex-wrap:wrap; gap:16px; }
</style>
</head>
<body>
  <h1>Logo — Valor por Extenso</h1>
  <p>Pré-visualização em 256×256. Clique para baixar o PNG.</p>

  <div class="preview">
    <!-- SVG MASTER 256x256 -->
    <svg id="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
      <defs>
        <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"  stop-color="#1e3a8a"/>
          <stop offset="55%" stop-color="#13245c"/>
          <stop offset="100%" stop-color="#0a1530"/>
        </linearGradient>
        <linearGradient id="symbolGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#3b82f6"/>
          <stop offset="100%" stop-color="#1e40af"/>
        </linearGradient>
        <radialGradient id="innerGlow" cx="50%" cy="45%" r="55%">
          <stop offset="0%"  stop-color="#ffffff"/>
          <stop offset="80%" stop-color="#eef3ff"/>
          <stop offset="100%" stop-color="#dbe5fb"/>
        </radialGradient>
        <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="0.6"/>
        </filter>
      </defs>

      <!-- Outer ring with subtle gear/notches -->
      <g>
        <!-- 12 small notches around the ring -->
        <g fill="url(#ringGrad)">
          <!-- generated notches -->
          <g id="notches"></g>
        </g>
        <circle cx="128" cy="128" r="120" fill="url(#ringGrad)"/>
        <circle cx="128" cy="128" r="98"  fill="url(#innerGlow)"/>
      </g>

      <!-- Circuit decorations on the ring -->
      <g stroke="#7aa7ff" stroke-width="1.6" fill="none" opacity="0.85">
        <!-- top arc trace -->
        <path d="M 80 24 Q 128 14 176 24" />
        <path d="M 232 80 Q 242 128 232 176" />
        <path d="M 176 232 Q 128 242 80 232" />
        <path d="M 24 176 Q 14 128 24 80" />
      </g>
      <g fill="#9ec1ff">
        <circle cx="80"  cy="24"  r="3"/>
        <circle cx="176" cy="24"  r="3"/>
        <circle cx="232" cy="80"  r="3"/>
        <circle cx="232" cy="176" r="3"/>
        <circle cx="176" cy="232" r="3"/>
        <circle cx="80"  cy="232" r="3"/>
        <circle cx="24"  cy="176" r="3"/>
        <circle cx="24"  cy="80"  r="3"/>
      </g>

      <!-- Inner ring stroke -->
      <circle cx="128" cy="128" r="98" fill="none" stroke="#0a1530" stroke-width="2" opacity="0.25"/>

      <!-- Central symbol: stylized $ -->
      <g transform="translate(128 132)" text-anchor="middle">
        <text y="40"
              font-family="Georgia, 'Times New Roman', serif"
              font-weight="700"
              font-size="160"
              fill="url(#symbolGrad)">$</text>
      </g>

      <!-- Tiny circuit nodes inside the disk for tech feel -->
      <g fill="#1e3a8a" opacity="0.35">
        <circle cx="60"  cy="128" r="2.2"/>
        <circle cx="196" cy="128" r="2.2"/>
        <circle cx="128" cy="60"  r="2.2"/>
      </g>
      <g stroke="#1e3a8a" stroke-width="1" opacity="0.25" fill="none">
        <path d="M 60 128 L 70 128"/>
        <path d="M 186 128 L 196 128"/>
        <path d="M 128 60 L 128 70"/>
      </g>
    </svg>
  </div>

  <div class="row">
    <button onclick="downloadPng(256)">Baixar PNG 256×256</button>
    <button onclick="downloadPng(512)">Baixar PNG 512×512 (alta resolução)</button>
    <button onclick="downloadSvg()">Baixar SVG (vetorial)</button>
  </div>

<script>
  // populate gear notches
  (function(){
    const g = document.getElementById('notches');
    const cx=128, cy=128, r=120;
    for (let i=0;i<12;i++){
      const a = (i/12)*Math.PI*2;
      const x = cx + Math.cos(a)*r;
      const y = cy + Math.sin(a)*r;
      const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
      rect.setAttribute('x', (x-5).toFixed(2));
      rect.setAttribute('y', (y-5).toFixed(2));
      rect.setAttribute('width','10');
      rect.setAttribute('height','10');
      rect.setAttribute('transform', `rotate(${(a*180/Math.PI)+45} ${x} ${y})`);
      rect.setAttribute('fill','#0a1530');
      g.appendChild(rect);
    }
  })();

  function svgString() {
    const svg = document.getElementById('logo').cloneNode(true);
    return new XMLSerializer().serializeToString(svg);
  }

  function downloadPng(size){
    const svgStr = svgString();
    const blob = new Blob([svgStr], {type:'image/svg+xml;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = function(){
      const c = document.createElement('canvas');
      c.width = size; c.height = size;
      const ctx = c.getContext('2d');
      ctx.clearRect(0,0,size,size);
      ctx.drawImage(img, 0, 0, size, size);
      c.toBlob(function(b){
        const a = document.createElement('a');
        a.href = URL.createObjectURL(b);
        a.download = `valor-por-extenso-${size}x${size}.png`;
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
      }, 'image/png');
    };
    img.src = url;
  }

  function downloadSvg(){
    const blob = new Blob([svgString()], {type:'image/svg+xml;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'valor-por-extenso.svg';
    document.body.appendChild(a); a.click(); a.remove();
  }
</script>
</body>
</html>
